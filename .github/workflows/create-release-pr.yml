name: Create Release PR

on:
  workflow_dispatch:

jobs:
  create-release-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create PR develop to release
        uses: repo-sync/pull-request@v2
        with:
          source_branch: develop
          destination_branch: release
          pr_title: "[render preview] Release Users API"
          pr_body: "Release candidate generated from develop to release for Render preview validation."
          github_token: ${{ secrets.GITHUB_TOKEN }}